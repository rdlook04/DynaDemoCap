# ============================================================================
# Fluent Bit -> Dynatrace · Logs de auditoría del servidor (BASE / v0)
# ----------------------------------------------------------------------------
# Lee /var/log/audit/audit.log (auditd) y lo envía a Dynatrace por la API de
# ingesta de logs (/api/v2/logs/ingest).
#
# El audit.log es root:root 0600, por eso este pipeline corre en un contenedor
# DOCKER (daemon root) con /var/log/audit montado en /host/audit. Métricas y
# logs van separados: métricas en podman rootless, logs aquí con privilegio.
#
# Credenciales vía --env-file dynatrace.env (DYNATRACE_HOST / DYNATRACE_API_TOKEN,
# token con scope logs.ingest).
# ============================================================================

[SERVICE]
    flush             5
    log_level         info
    parsers_file      parsers.conf

# --- Entrada: audit log del host (montado en /host/audit) -------------------
[INPUT]
    name              tail
    tag               audit.log
    path              /host/audit/audit.log
    read_from_head    false
    refresh_interval  5
    db                /tmp/audit_tail.db

# --- Renombrar el campo crudo 'log' a 'content' (lo que Dynatrace muestra) ---
[FILTER]
    name              modify
    match             audit.log
    rename            log content

# --- Añadir atributos de origen ---------------------------------------------
[FILTER]
    name              record_modifier
    match             audit.log
    record            host.name dynademocap-server
    record            log.source linux-auditd
    record            service.name dynademocap

# --- Salida: Dynatrace Log Ingest API ---------------------------------------
[OUTPUT]
    name              http
    match             audit.log
    host              ${DYNATRACE_HOST}
    port              443
    uri               /api/v2/logs/ingest
    format            json
    json_date_key     timestamp
    json_date_format  iso8601
    tls               on
    tls.verify        on
    header            Authorization Api-Token ${DYNATRACE_API_TOKEN}
