# ============================================================================
# Parsers para Fluent Bit. Por ahora la base envía métricas (no requiere
# parser), pero dejamos listo el parser JSON para cuando agreguemos los
# logs estructurados de DynaDemoCap (SIM/PER emiten JSON de una línea).
# ============================================================================

[PARSER]
    name        dynademocap_json
    format      json
    time_key    timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%z
    time_keep   on
