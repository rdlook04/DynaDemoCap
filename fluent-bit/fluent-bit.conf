# ============================================================================
# Fluent Bit -> Dynatrace · Métricas básicas de host (BASE / v0)
# ----------------------------------------------------------------------------
# Recolecta métricas de host (CPU, memoria, disco, red, carga, filesystem) y
# las internas del propio Fluent Bit, y las envía vía OTLP/HTTP al endpoint
# OpenTelemetry de Dynatrace.
#
# Variables de entorno requeridas (ver dynatrace.env.example):
#   DYNATRACE_HOST       -> host del entorno SIN https:// (p.ej. abc12345.live.dynatrace.com)
#   DYNATRACE_API_TOKEN  -> token dt0c01.... con scope "metrics.ingest"
#
# Ejecutar:  ./run.sh        (carga dynatrace.env y lanza fluent-bit)
# ============================================================================

[SERVICE]
    flush             5
    log_level         info
    parsers_file      parsers.conf
    # Endpoint local de salud/métricas internas (útil para depurar): :2020
    http_server       on
    http_listen       0.0.0.0
    http_port         2020

# --- Métricas de host: CPU, memoria, disco, red, carga, filesystem ----------
[INPUT]
    name              node_exporter_metrics
    tag               host.metrics
    scrape_interval   30

# --- Métricas internas del propio Fluent Bit (throughput, drops, retries) ---
[INPUT]
    name              fluentbit_metrics
    tag               fluentbit.metrics
    scrape_interval   30

# --- Salida: Dynatrace (OTLP/HTTP · métricas) -------------------------------
[OUTPUT]
    name              opentelemetry
    match             *
    host              ${DYNATRACE_HOST}
    port              443
    metrics_uri       /api/v2/otlp/v1/metrics
    tls               on
    tls.verify        on
    header            Authorization Api-Token ${DYNATRACE_API_TOKEN}
    # Etiquetas de recurso para identificar el origen en Dynatrace
    add_label         host dynademocap-server
    add_label         service.name dynademocap-fluentbit

# --- (DEBUG opcional) Volcar las métricas también por consola ---------------
# Descomenta para verificar localmente qué se está enviando:
# [OUTPUT]
#     name            stdout
#     match           *
