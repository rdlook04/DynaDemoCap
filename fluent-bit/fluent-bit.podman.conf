# ============================================================================
# Variante para ejecución en contenedor (podman rootless).
# Igual que fluent-bit.conf pero node_exporter_metrics lee el /proc y /sys del
# HOST montados en /host/proc y /host/sys (para métricas reales del servidor,
# no del contenedor).
# Credenciales vía --env-file dynatrace.env  (DYNATRACE_HOST / DYNATRACE_API_TOKEN)
# ============================================================================

[SERVICE]
    flush             5
    log_level         info
    parsers_file      parsers.conf
    http_server       on
    http_listen       0.0.0.0
    http_port         2020

# --- Métricas de host (leyendo el /proc y /sys del host montados) ------------
# 'metrics' selecciona los colectores activos. Incluye cpu y excluye systemd
# (que fallaba por no tener el journal montado).
# NOTA: las métricas tipo GAUGE (memoria, carga, filesystem, temperatura, filefd)
# entran a Dynatrace OK. Los contadores acumulativos '*_total' (p.ej.
# node_cpu_seconds_total) son rechazados por el endpoint OTLP de Dynatrace
# (UNSUPPORTED_METRIC_TYPE_MONOTONIC_CUMULATIVE_SUM). El colector cpu funciona;
# para que CPU se ingiera hay que habilitar conversión cumulative->delta en
# Dynatrace (Settings > Metrics/OpenTelemetry). Pendiente de "mejoras".
[INPUT]
    name              node_exporter_metrics
    tag               host.metrics
    scrape_interval   30
    path.procfs       /host/proc
    path.sysfs        /host/sys
    metrics           cpu,cpufreq,meminfo,loadavg,diskstats,filesystem,stat,netdev,vmstat,filefd,uname,time

# --- Métricas internas del propio Fluent Bit --------------------------------
[INPUT]
    name              fluentbit_metrics
    tag               fluentbit.metrics
    scrape_interval   30

# --- Salida: Dynatrace (OTLP/HTTP · métricas) -------------------------------
[OUTPUT]
    name              opentelemetry
    match             *
    host              ${DYNATRACE_HOST}
    port              443
    metrics_uri       /api/v2/otlp/v1/metrics
    tls               on
    tls.verify        on
    header            Authorization Api-Token ${DYNATRACE_API_TOKEN}
    add_label         host dynademocap-server
    add_label         service.name dynademocap-fluentbit
