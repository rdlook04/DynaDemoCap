# ============================================================================
# Variante para ejecución en contenedor (podman rootless).
# Igual que fluent-bit.conf pero node_exporter_metrics lee el /proc y /sys del
# HOST montados en /host/proc y /host/sys (para métricas reales del servidor,
# no del contenedor).
# Credenciales vía --env-file dynatrace.env  (DYNATRACE_HOST / DYNATRACE_API_TOKEN)
# ============================================================================

[SERVICE]
    flush             5
    # log_level error: el OneAgent del host captura el stdout del contenedor;
    # con 'info' ensuciaría Dynatrace Logs con un "HTTP 200" por cada envío.
    log_level         error
    parsers_file      parsers.conf
    http_server       on
    http_listen       0.0.0.0
    http_port         2020

# --- Demo: métricas de host vía Fluent Bit (complementa al OneAgent) ----------
# Enviamos GAUGES (lo que acepta el OTLP de este Dynatrace Metrics Classic):
#   - RAM:        node_memory_*        (meminfo)
#   - Carga CPU:  node_load1/5/15      (loadavg)  [gauge; CPU% lo da el OneAgent]
# Los contadores acumulativos (node_cpu_seconds_total, etc.) los rechaza el
# endpoint, así que NO se envían (evita los ERROR en el log).
[INPUT]
    name              node_exporter_metrics
    tag               host.metrics
    scrape_interval   15
    path.procfs       /host/proc
    path.sysfs        /host/sys
    metrics           meminfo,loadavg

# (Se quitó el input fluentbit_metrics: emitía un contador 'fluentbit_uptime' y
#  un histograma 'fluentbit_output_latency_seconds', ambos acumulativos -> rechazados.)

# --- Salida: Dynatrace (OTLP/HTTP · métricas) -------------------------------
[OUTPUT]
    name              opentelemetry
    match             *
    host              ${DYNATRACE_HOST}
    port              443
    metrics_uri       /api/v2/otlp/v1/metrics
    tls               on
    tls.verify        on
    header            Authorization Api-Token ${DYNATRACE_API_TOKEN}
    add_label         host dynademocap-server
    add_label         service.name dynademocap-fluentbit
